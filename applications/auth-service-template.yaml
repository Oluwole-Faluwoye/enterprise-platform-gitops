# Template only
# To be enabled during Stage G Application Onboarding

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: auth-service
  namespace: argocd

spec:
  project: default

  source:
    repoURL: git@github.com:Oluwole-Faluwoye/enterprise-microservices.git
    targetRevision: main
    path: services/auth-service/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: auth

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true