apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: auth-service
  namespace: argocd

spec:

  project: default

  source:

    repoURL: git@github.com:Oluwole-Faluwoye/enterprise-platform-gitops.git

    targetRevision: main

    path: charts/auth-service

    helm:

      valueFiles:
        - values-dev.yaml

  destination:

    server: https://kubernetes.default.svc

    namespace: auth

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:
      - CreateNamespace=true