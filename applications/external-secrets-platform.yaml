apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:

  name: external-secrets-platform

  namespace: argocd

  annotations:

    argocd.argoproj.io/sync-wave: "0"

spec:

  project: default

  source:

    repoURL: git@github.com:Oluwole-Faluwoye/enterprise-platform-gitops.git

    targetRevision: main

    path: charts/external-secrets

  destination:

    server: https://kubernetes.default.svc

    namespace: external-secrets

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:

      - CreateNamespace=true