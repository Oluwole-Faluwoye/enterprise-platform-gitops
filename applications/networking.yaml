apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:

  name: networking

  namespace: argocd

  annotations:

    argocd.argoproj.io/sync-wave: "7"

spec:

  project: default

  source:

    repoURL: git@github.com:Oluwole-Faluwoye/enterprise-platform-gitops.git

    targetRevision: main

    path: charts/networking

  destination:

    server: https://kubernetes.default.svc

    namespace: default

  syncPolicy:

    automated:

      prune: true

      selfHeal: true