apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: promtail
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "6"

spec:

  project: default

  sources:

    - repoURL: https://grafana.github.io/helm-charts

      chart: promtail

      targetRevision: 6.17.0

      helm:

        valueFiles:

          - $values/charts/monitoring/promtail-values.yaml

    - repoURL: git@github.com:Oluwole-Faluwoye/enterprise-platform-gitops.git

      targetRevision: main

      ref: values

  destination:

    server: https://kubernetes.default.svc

    namespace: monitoring

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:

      - CreateNamespace=true