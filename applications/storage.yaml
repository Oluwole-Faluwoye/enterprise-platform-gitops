apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: storage
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "-1"

spec:

  project: default

  source:

    repoURL: git@github.com:Oluwole-Faluwoye/enterprise-platform-gitops.git

    targetRevision: main

    path: manifests/storage

  destination:

    server: https://kubernetes.default.svc

  syncPolicy:

    automated:

      prune: true

      selfHeal: true