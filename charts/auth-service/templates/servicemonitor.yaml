apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:

  name: auth-service

spec:

  selector:

    matchLabels:

      app.kubernetes.io/name: {{ include "auth-service.name" . }}

      app.kubernetes.io/instance: {{ .Release.Name }}

  endpoints:

    - port: http

      path: /actuator/prometheus

      interval: 15s