# =========================================================
# GLOBAL
# =========================================================

global:

  project: enterprise-platform

  environment: dev

replicaCount: 2

# =========================================================
# IMAGE
# =========================================================

image:
  repository: ""
  pullPolicy: Always
  tag: ""

imagePullSecrets: []

# =========================================================
# APPLICATION
# =========================================================

application:

  port: 8080

  profile: dev

# =========================================================
# APPLICATION SECRETS
# =========================================================

secrets:

  authService:

    kubernetesSecret: auth-service-secret

env:

  - name: JWT_SECRET
    secretKey: jwt-secret

  - name: SPRING_DATASOURCE_USERNAME
    secretKey: database-username

  - name: SPRING_DATASOURCE_PASSWORD
    secretKey: database-password

  - name: SPRING_DATASOURCE_URL
    secretKey: database-url

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}

podLabels:
  app: auth-service

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

httpRoute:
  enabled: false

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"

  limits:
    cpu: "500m"
    memory: "512Mi"

health:

  path: /actuator/health

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}