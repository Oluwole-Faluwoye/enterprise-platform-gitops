provider: aws

aws:

  region: us-east-1

domainFilters:

  - dreammyles.online

policy: sync

registry: txt

txtOwnerId: enterprise-platform

serviceAccount:

  create: true

  annotations: {}

    eks.amazonaws.com/role-arn: ${EXTERNAL_DNS_ROLE_ARN}

sources:

  - ingress

  - service

interval: 1m

logLevel: info

triggerLoopOnEvent: true