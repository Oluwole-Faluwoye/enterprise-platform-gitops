apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore

metadata:

  name: {{ .Values.secretStore.name }}

spec:

  provider:

    aws:

      service: SecretsManager

      region: {{ .Values.global.awsRegion }}

      auth:

        jwt:

          serviceAccountRef:

            name: {{ .Values.serviceAccount.name }}

            namespace: external-secrets