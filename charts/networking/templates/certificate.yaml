{{- if .Values.tls.enabled }}

apiVersion: cert-manager.io/v1

kind: Certificate

metadata:

  name: platform-certificate

  namespace: {{ .Values.global.namespace }}

spec:

  secretName: {{ .Values.tls.secretName }}

  issuerRef:

    name: {{ .Values.tls.issuer.name }}

    kind: ClusterIssuer

  dnsNames:

    - {{ .Values.hosts.auth.hostname }}

    - {{ .Values.hosts.grafana.hostname }}

    - {{ .Values.hosts.argocd.hostname }}

{{- end }}