{{- if (.Values.tls.enabled | default false) }}

apiVersion: cert-manager.io/v1

kind: ClusterIssuer

metadata:

  name: {{ .Values.tls.issuer.name }}

spec:

  acme:

    email: {{ .Values.tls.issuer.email }}

    server: {{ .Values.tls.issuer.server }}

    privateKeySecretRef:

      name: letsencrypt-account-key

    solvers:

      - http01:

          ingress:

            ingressClassName: {{ .Values.alb.ingressClass }}

{{- end }}